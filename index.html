  <!DOCTYPE html>
  <html lang="ja">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWW 原価管理</title>
  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }
  .header { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 16px; font-weight: 700; }
  .header .updated { font-size: 11px; opacity: 0.6; }
  .cards { display: flex; gap: 12px; padding: 16px 24px; overflow-x: auto; }
  .card { background: white; border-radius: 10px; padding: 14px 18px; min-width: 130px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); flex-shrink: 0; }
  .card .c-label { font-size: 10px; color: #888; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; }
  .card .c-value { font-size: 22px; font-weight: 800; color: #1a2e44; line-height: 1; }
  .card .c-sub { font-size: 10px; color: #aaa; margin-top: 4px; }
  .tabs-bar { background: white; border-bottom: 1px solid #e8e8e8; padding: 0 24px; display: flex; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .tab-btn { padding: 13px 18px; cursor: pointer; font-size: 13px; color: #999; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .tab-btn.active { color: #1a2e44; border-bottom-color: #2c5364; font-weight: 700; }
  .content { padding: 16px 24px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .search-input { flex: 1; min-width: 200px; max-width: 280px; padding: 8px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; outline: none; }
  .search-input:focus { border-color: #2c5364; }
  .chip { padding: 5px 14px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 12px; color: #666; }
  .chip.active { background: #1a2e44; color: white; border-color: #1a2e44; }
  .table-wrap { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 580px; }
  thead th { background: #f7f8fa; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: #888; border-bottom: 1px solid #eee; white-space: nowrap; }
  tbody td { padding: 10px 14px; border-bottom: 1px solid #f2f2f2; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #fafbfc; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .b-G  { background: #dbeafe; color: #1d4ed8; }
  .b-SB { background: #dcfce7; color: #15803d; }
  .b-HC { background: #fce7f3; color: #be185d; }
  .b-P  { background: #ede9fe; color: #6d28d9; }
  .b-CO { background: #f3f4f6; color: #374151; }
  .b-on { background: #dcfce7; color: #15803d; }
  .b-off{ background: #f3f4f6; color: #9ca3af; }
  .ap-card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 12px; overflow: hidden; }
  .ap-card-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
  .ap-card-header:hover { background: #fafbfc; }
  .ap-title { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .ap-total { font-size: 13px; font-weight: 600; color: #1a2e44; }
  .chevron { font-size: 10px; color: #bbb; transition: transform 0.2s; }
  .collapsed .chevron { transform: rotate(-90deg); }
  .dept-section { margin-bottom: 16px; }
  .dept-title { font-size: 13px; font-weight: 700; color: #666; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .count-tag { background: #f0f0f0; color: #888; font-size: 11px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
  .state-msg { text-align: center; padding: 48px; color: #aaa; }
  .state-msg.error { color: #e53935; }
  .billing-member { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 10px; overflow: hidden; }
  .billing-member-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .billing-member-header:hover { background: #fafbfc; }
  .billing-months { display: none; border-top: 1px solid #f0f0f0; }
  .billing-month-row { display: flex; justify-content: space-between; padding: 8px 18px; border-bottom: 1px solid #f7f7f7; font-size: 13px; }
  .billing-month-row:last-child { border-bottom: none; }
  .billing-month-label { color: #888; }
  .billing-month-amount { font-weight: 600; color: #1a2e44; }
  </style>
  </head>
  <body>

  <div class="header">
    <h1>SWW 原価管理ダッシュボード</h1>
    <span class="updated" id="updated-at">読み込み中…</span>
  </div>

  <div class="cards">
    <div class="card"><div class="c-label">稼働中</div><div class="c-value" id="c-active">-</div><div class="c-sub">名</div></div>
    <div class="card"><div class="c-label">月額合計</div><div class="c-value" id="c-total">-</div><div class="c-sub">円/月（月額契約のみ）</div></div>
    <div class="card"><div class="c-label">G部門</div><div class="c-value" id="c-g">-</div><div class="c-sub">名</div></div>
    <div class="card"><div class="c-label">SB部門</div><div class="c-value" id="c-sb">-</div><div class="c-sub">名</div></div>
    <div class="card"><div class="c-label">HC部門</div><div class="c-value" id="c-hc">-</div><div class="c-sub">名</div></div>
    <div class="card"><div class="c-label">P部門</div><div class="c-value" id="c-p">-</div><div class="c-sub">名</div></div>
  </div>

  <div class="tabs-bar">
    <div class="tab-btn active" onclick="switchTab('members',this)">👤 メンバー一覧</div>
    <div class="tab-btn" onclick="switchTab('ap',this)">🏢 AP会社別</div>
    <div class="tab-btn" onclick="switchTab('dept',this)">📊 部門別</div>
    <div class="tab-btn" onclick="switchTab('billing',this);loadBilling()">💴 支払予定</div>
  </div>

  <div class="content">

    <div class="tab-panel active" id="panel-members">
      <div class="toolbar">
        <input type="text" class="search-input" id="search" placeholder="名前・会社名で検索…" oninput="render()">
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span class="chip active" data-filter="status" data-val="" onclick="setChip(this,'status')">すべて</span>
          <span class="chip" data-filter="status" data-val="契約中" onclick="setChip(this,'status')">契約中</span>
          <span class="chip" data-filter="status" data-val="契約終了" onclick="setChip(this,'status')">契約終了</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span class="chip active" data-filter="dept" data-val="" onclick="setChip(this,'dept')">全部門</span>
          <span class="chip" data-filter="dept" data-val="G" onclick="setChip(this,'dept')">G</span>
          <span class="chip" data-filter="dept" data-val="SB" onclick="setChip(this,'dept')">SB</span>
          <span class="chip" data-filter="dept" data-val="HC" onclick="setChip(this,'dept')">HC</span>
          <span class="chip" data-filter="dept" data-val="P" onclick="setChip(this,'dept')">P</span>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>氏名</th><th>部署</th><th>区分</th><th>AP / 会社名</th>
            <th>稼働時間</th><th>支払方法</th><th>単価</th><th>契約状況</th>
          </tr></thead>
          <tbody id="member-tbody"><tr><td colspan="8" class="state-msg">読み込み中…</td></tr></tbody>
        </table>
      </div>
      <div id="member-count" style="font-size:12px;color:#aaa;margin-top:8px;text-align:right"></div>
    </div>

    <div class="tab-panel" id="panel-ap">
      <div class="toolbar">
        <span class="chip active" data-filter="ap-status" data-val="" onclick="setChip(this,'ap-status');renderAp()">すべて</span>
        <span class="chip" data-filter="ap-status" data-val="契約中" onclick="setChip(this,'ap-status');renderAp()">契約中のみ</span>
      </div>
      <div id="ap-container"><div class="state-msg">読み込み中…</div></div>
    </div>

    <div class="tab-panel" id="panel-dept">
      <div class="toolbar">
        <span class="chip active" data-filter="dp-status" data-val="" onclick="setChip(this,'dp-status');renderDept()">すべて</span>
        <span class="chip" data-filter="dp-status" data-val="契約中" onclick="setChip(this,'dp-status');renderDept()">契約中のみ</span>
      </div>
      <div id="dept-container"><div class="state-msg">読み込み中…</div></div>
    </div>

     <div class="tab-panel" id="panel-billing">
        <div class="toolbar">
          <span class="chip active" data-filter="bl-dept" data-val="" onclick="setChip(this,'bl-dept');renderBilling()">全部門</span>
          <span class="chip" data-filter="bl-dept" data-val="G" onclick="setChip(this,'bl-dept');renderBilling()">G</span>
          <span class="chip" data-filter="bl-dept" data-val="SB" onclick="setChip(this,'bl-dept');renderBilling()">SB</span>
          <span class="chip" data-filter="bl-dept" data-val="HC" onclick="setChip(this,'bl-dept');renderBilling()">HC</span>
        </div>
        <div id="billing-container"><div class="state-msg">タブを開くと読み込みます</div></div>
      </div>

  </div>

  <script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz0t2VHnKZ3hM5IFj7KlmZ-swUqBxSXHbpB4gyFTipxvXNm9o5aAj1szUvfkxi4xYNL/exec';
  let allMembers = [];
  const filters = { status:'', dept:'', 'ap-status':'', 'dp-status':'' };

  async function load() {
    try {
      const res  = await fetch(GAS_URL + '?action=members&t=' + Date.now());
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      allMembers = json.members || [];
      document.getElementById('updated-at').textContent =
        new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) + ' 更新';
      updateCards(); render(); renderAp(); renderDept();
    } catch(e) {
      document.getElementById('member-tbody').innerHTML =
        `<tr><td colspan="8" class="state-msg error">エラー: ${e.message}</td></tr>`;
    }
  }

  function updateCards() {
    const active = allMembers.filter(m => m.契約状況 === '契約中');
    let total = 0;
    active.forEach(m => { if (m.支払方法 === '月額') total += parseCost(m.単価); });
    set('c-active', active.length);
    set('c-total', total > 0 ? fmtCost(total) : '-');
    set('c-g',  active.filter(m=>m.部署==='G').length);
    set('c-sb', active.filter(m=>m.部署==='SB').length);
    set('c-hc', active.filter(m=>m.部署==='HC').length);
    set('c-p',  active.filter(m=>m.部署==='P').length);
  }

  function render() {
    const q = (document.getElementById('search').value||'').toLowerCase();
    const list = allMembers.filter(m => {
      if (filters.status && m.契約状況 !== filters.status) return false;
      if (filters.dept   && m.部署 !== filters.dept)        return false;
      if (q && !`${m.氏名}${m.AP会社}${m.会社名}`.toLowerCase().includes(q)) return false;
      return true;
    });
    const tbody = document.getElementById('member-tbody');
    if (!list.length) { tbody.innerHTML='<tr><td colspan="8" class="state-msg">該当なし</td></tr>'; set('member-count',''); return; }
    tbody.innerHTML = list.map(m=>`
      <tr>
        <td style="font-weight:600">${m.氏名}</td>
        <td>${deptBadge(m.部署)}</td>
        <td style="font-size:12px;color:#666">${m.区分||'-'}</td>
        <td style="font-size:12px">${m.AP会社||m.会社名||'<span style="color:#ccc">直接</span>'}</td>
        <td style="font-size:12px">${m.稼働時間?m.稼働時間+'h':'-'}</td>
        <td style="font-size:12px">${m.支払方法||'-'}</td>
        <td>${fmtUnit(m)}</td>
        <td><span class="badge ${m.契約状況==='契約中'?'b-on':'b-off'}">${m.契約状況||'-'}</span></td>
      </tr>`).join('');
    document.getElementById('member-count').textContent = list.length + '件表示';
  }

  function renderAp() {
    const src = filters['ap-status'] ? allMembers.filter(m=>m.契約状況===filters['ap-status']) : allMembers;
    const groups = {};
    src.forEach(m=>{ const k=m.AP会社||'（直接契約・個人）'; (groups[k]=groups[k]||[]).push(m); });
    const sorted = Object.entries(groups).sort((a,b)=>b[1].length-a[1].length);
    const c = document.getElementById('ap-container');
    if (!sorted.length) { c.innerHTML='<div class="state-msg">データなし</div>'; return; }
    c.innerHTML = sorted.map(([ap,members])=>{
      const sum = members.filter(m=>m.支払方法==='月額').reduce((s,m)=>s+parseCost(m.単価),0);
      const rows = members.map(m=>`<tr>
        <td style="font-weight:600">${m.氏名}</td>
        <td>${deptBadge(m.部署)}</td>
        <td style="font-size:12px">${m.稼働時間?m.稼働時間+'h':'-'}</td>
        <td>${fmtUnit(m)}</td>
        <td><span class="badge ${m.契約状況==='契約中'?'b-on':'b-off'}">${m.契約状況||'-'}</span></td>
      </tr>`).join('');
      return `<div class="ap-card">
        <div class="ap-card-header" onclick="toggleCard(this)">
          <div class="ap-title">🏢 ${ap} <span class="count-tag">${members.length}名</span></div>
          <div style="display:flex;align-items:center;gap:12px">
            ${sum>0?`<div class="ap-total">月額計 ¥${fmtCost(sum)}</div>`:''}
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="ap-body"><table style="box-shadow:none;border-radius:0">
          <thead><tr><th>氏名</th><th>部署</th><th>稼働h</th><th>単価</th><th>状況</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </div>`;
    }).join('');
  }

  function renderDept() {
    const src = filters['dp-status'] ? allMembers.filter(m=>m.契約状況===filters['dp-status']) : allMembers;
    const c = document.getElementById('dept-container');
    c.innerHTML = ['G','SB','HC','P','CO'].map(dept=>{
      const members = src.filter(m=>m.部署===dept);
      if (!members.length) return '';
      const sum = members.filter(m=>m.支払方法==='月額').reduce((s,m)=>s+parseCost(m.単価),0);
      const rows = members.map(m=>`<tr>
        <td style="font-weight:600">${m.氏名}</td>
        <td style="font-size:12px">${m.区分||'-'}</td>
        <td style="font-size:12px">${m.AP会社||m.会社名||'直接'}</td>
        <td style="font-size:12px">${m.稼働時間?m.稼働時間+'h':'-'}</td>
        <td>${fmtUnit(m)}</td>
        <td><span class="badge ${m.契約状況==='契約中'?'b-on':'b-off'}">${m.契約状況||'-'}</span></td>
      </tr>`).join('');
      return `<div class="dept-section">
        <div class="dept-title">${deptBadge(dept)} <span class="count-tag">${members.length}名</span>
          ${sum>0?`<span style="color:#1a2e44;font-size:12px;margin-left:8px">月額計 ¥${fmtCost(sum)}</span>`:''}
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>氏名</th><th>区分</th><th>AP/会社</th><th>稼働h</th><th>単価</th><th>状況</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </div>`;
    }).join('') || '<div class="state-msg">データなし</div>';
  }

  function deptBadge(d){ const c={G:'b-G',SB:'b-SB',HC:'b-HC',P:'b-P',CO:'b-CO'}[d]||'b-CO'; return `<span class="badge ${c}">${d||'-'}</span>`; }
  function fmtUnit(m){ const n=parseCost(m.単価); if(!n) return `<span style="color:#ccc">${m.単価||'-'}</span>`; if(m.支払方法==='月額') return `<strong>¥${fmtCost(n)}/月</strong>`; if(m.支払方法==='時給')
  return `<span style="color:#888">¥${fmtCost(n)}/h</span>`; return `¥${fmtCost(n)}`; }
  function parseCost(v){ const n=parseInt(String(v||'').replace(/[^0-9]/g,'')); return isNaN(n)?0:n; }
  function fmtCost(n){ return n.toLocaleString('ja-JP'); }
  function set(id,v){ const el=document.getElementById(id); if(el) el.textContent=v; }
  function setChip(el,k){ document.querySelectorAll(`[data-filter="${k}"]`).forEach(c=>c.classList.remove('active')); el.classList.add('active'); filters[k]=el.dataset.val; render(); }
  function toggleCard(h){ const b=h.nextElementSibling; const c=h.parentElement; const col=b.style.display==='none'; b.style.display=col?'':'none'; c.classList.toggle('collapsed',!col); }
  function switchTab(id,el){ document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); document.getElementById('panel-'+id).classList.add('active'); }

    const filters = { status:'', dept:'', 'ap-status':'', 'dp-status':'', 'bl-dept':'' };
      let billingData = [];
  let billingLoaded = false;

  async function loadBilling() {
    if (billingLoaded) return;
    document.getElementById('billing-container').innerHTML = '<div class="state-msg">読み込み中…</div>';
    try {
      const res = await fetch(GAS_URL + '?action=billing&t=' + Date.now());
      const json = await res.json();
      if (json.error) throw new Error(json.error);
      billingData = json.billing || [];
      billingLoaded = true;
      renderBilling();
    } catch(e) {
      document.getElementById('billing-container').innerHTML =
        `<div class="state-msg error">エラー: ${e.message}</div>`;
    }
  }

  function renderBilling() {
    const deptF = filters['bl-dept'] || '';
    const src = deptF ? billingData.filter(m => m.dept === deptF) : billingData;
    const c = document.getElementById('billing-container');
    if (!src.length) { c.innerHTML = '<div class="state-msg">データなし</div>'; return; }
    const sorted = [...src].sort((a,b) => (a.dept+a.name).localeCompare(b.dept+b.name,'ja'));
    c.innerHTML = sorted.map(m => {
      const months = Object.entries(m.months).sort((a,b) => b[0].localeCompare(a[0]));
      const latest = months.length ? months[0][1] : 0;
      const rows = months.map(([month, amt]) =>
        `<div class="billing-month-row"><span class="billing-month-label">${month}</span><span class="billing-month-amount">¥${fmtCost(amt)}</span></div>`
      ).join('');
      return `<div class="billing-member">
        <div class="billing-member-header" onclick="toggleBilling(this)">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-weight:700">${m.name}</span>${deptBadge(m.dept)}
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:12px;color:#888">最新 ¥${fmtCost(latest)}</span>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="billing-months">${rows}</div>
      </div>`;
    }).join('');
  }

  function toggleBilling(h) {
    const body = h.nextElementSibling;
    const isOpen = body.style.display === 'block';
    body.style.display = isOpen ? 'none' : 'block';
    h.querySelector('.chevron').style.transform = isOpen ? '' : 'rotate(180deg)';
  }
  load();
  </script>
  </body>
  </html>
